name: tests

# CPU-only test workflow. It never downloads the large external scientific data
# (SPICE kernels, gravity/topography grids) and never requires a GPU: the marker
# filter below deselects `slow`, `requires_data`, and `requires_cuda` tests, and
# data-dependent tests skip themselves when their inputs are absent.
#
# Optional deps (PyTorch CPU build, h5py, PySide6) are installed because parts of
# the existing suite import them at module load. torch tests fall back to a clean
# skip via `pytest.importorskip` when torch is unavailable.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    env:
      # Headless Qt: the UI tests run against the offscreen platform plugin.
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install Lunaris (CPU stack + dev/test deps)
        run: pip install -e ".[all]"

      - name: Run reproducible benchmark smoke tests
        run: pytest tests/test_benchmark_config.py tests/test_benchmark_provenance.py tests/test_benchmark_validation.py tests/test_benchmark_pipeline_smoke.py -q

      - name: Run CPU-only test suite
        run: pytest tests/ -m "not slow and not requires_data and not requires_cuda" -q
