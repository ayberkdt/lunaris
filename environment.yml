name: st_lrps
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - numpy>=1.20.0
  - numba>=0.55.0
  - scipy>=1.8.0
  # Uncomment the pytorch-cuda version that matches your cluster's loaded CUDA module.
  # For example, if you load a module with CUDA 12.1, use pytorch-cuda=12.1.
  - pytorch>=2.0.0
  - pytorch-cuda=12.1
  - h5py>=3.0.0
  - matplotlib>=3.5.0
  - pandas>=1.3.0
  - tqdm>=4.60.0
  - pip
  - pip:
      - spiceypy>=5.0.0
      - pytest>=7.0.0
